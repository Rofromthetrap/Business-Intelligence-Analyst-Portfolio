name: BTC/USD Daily Data Refresh

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 06:00 UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Power BI/Crypto_Dash/requirements_ci.txt"

      - name: Install dependencies
        run: pip install -r "Power BI/Crypto_Dash/requirements_ci.txt"

      - name: Execute notebook
        env:
          API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          MPLBACKEND: Agg   # Non-interactive matplotlib backend (no display needed)
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=120 \
            "Power BI/Crypto_Dash/BTC_USD_Daily.ipynb"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Power BI/Crypto_Dash/BTC_USD_Daily.ipynb"
          git diff --cached --quiet || git commit -m "chore: refresh BTC/USD daily data [$(date -u +%Y-%m-%d)]"
          git pull --rebase
          git push
